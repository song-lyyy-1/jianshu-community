server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:jianshu;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  plugins:
    - pagination

jwt:
  secret: jianshu-community-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
