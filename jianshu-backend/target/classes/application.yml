server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jianshu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
  plugins:
    - pagination

jwt:
  secret: jianshu-community-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
